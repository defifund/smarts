service: smarts

deploy_timeout: 320

servers:
  web:
    - deploy.smarts.md

proxy:
  ssl: true
  hosts:
    - smarts.md
    - mcp.smarts.md
  healthcheck:
    timeout: 300

image: smarts

registry:
  server: localhost:5000
  username: dummy
  password: dummy

env:
  secret:
    - RAILS_MASTER_KEY
    - POSTGRES_PASSWORD
  clear:
    RAILS_ENV: production
    DB_HOST: smarts-db
    POSTGRES_DB: smarts_production
    POSTGRES_USER: rails
    SOLID_QUEUE_IN_PUMA: true
    WEB_CONCURRENCY: 0
    RAILS_MAX_THREADS: 3
    DB_POOL: 5

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell:   app exec --interactive --reuse "bash"
  logs:    app logs -f
  dbc:     app exec --interactive --reuse "bin/rails dbconsole"
  db:      app exec db psql -U rails -d smarts_production

volumes:
  - "smarts_storage:/rails/storage"

asset_path: /rails/public/assets

builder:
  arch: amd64
  driver: docker
  local: true

ssh:
  user: deploy

accessories:
  db:
    image: postgres:17
    host: deploy.smarts.md
    port: "127.0.0.1:5434:5432"
    env:
      clear:
        POSTGRES_USER: rails
        POSTGRES_DB: smarts_production
      secret:
        - POSTGRES_PASSWORD
    volumes:
      - /home/deploy/smarts_postgres_data:/var/lib/postgresql/data
